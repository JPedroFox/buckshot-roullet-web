<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - PvP (teste manual)</title>
<style>
  body {
    font-family: monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    max-width: 720px;
    margin: 20px auto;
    padding: 0 16px;
  }
  h1 { font-size: 18px; color: #ff5555; }
  .box {
    border: 1px solid #444;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    background: #222;
  }
  .players { display: flex; gap: 12px; }
  .player {
    flex: 1;
    padding: 8px;
    border: 1px solid #333;
    border-radius: 4px;
  }
  .player.turn { border-color: #55ff55; box-shadow: 0 0 6px #55ff5555; }
  .life { font-size: 20px; color: #ff8888; }
  button {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 10px;
    margin: 3px;
    border-radius: 4px;
    cursor: pointer;
    font-family: monospace;
  }
  button:hover:not(:disabled) { background: #444; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  #log {
    height: 220px;
    overflow-y: auto;
    background: #111;
    padding: 8px;
    font-size: 12px;
    border-radius: 4px;
  }
  .log-private { color: #ffcc55; }
  .log-error { color: #ff5555; }
  .log-system { color: #7799ff; }
  input {
    background: #111;
    color: #fff;
    border: 1px solid #555;
    padding: 6px;
    font-family: monospace;
    margin: 3px 0;
    display: block;
    width: 220px;
  }
  .error-text { color: #ff5555; font-size: 12px; min-height: 1.2em; }
  .toggle-link { color: #7799ff; cursor: pointer; text-decoration: underline; font-size: 12px; }
</style>
</head>
<body>

<h1>🔫 Buckshot Roulette Web — cliente de teste manual (PvP)</h1>

<div class="box" id="authBox">
  <div id="loginForm">
    <strong>Entrar</strong>
    <input id="loginUsername" placeholder="username" autocomplete="username" />
    <input id="loginPassword" type="password" placeholder="senha" autocomplete="current-password" />
    <button id="loginBtn">Entrar</button>
    <div class="error-text" id="loginError"></div>
    <span class="toggle-link" id="showRegister">Não tem conta? Cadastre-se</span>
  </div>

  <div id="registerForm" style="display:none">
    <strong>Cadastrar</strong>
    <input id="registerUsername" placeholder="username (3-20 caracteres, letras/números/_)" autocomplete="username" />
    <input id="registerPassword" type="password" placeholder="senha (mín. 6 caracteres)" autocomplete="new-password" />
    <button id="registerBtn">Cadastrar</button>
    <div class="error-text" id="registerError"></div>
    <span class="toggle-link" id="showLogin">Já tem conta? Entrar</span>
  </div>
</div>

<div class="box" id="connectBox" style="display:none">
  <div>Logado como <strong id="loggedUsername"></strong> <button id="logoutBtn">Sair</button></div>
  <button id="findMatchBtn">Procurar partida</button>
  <div id="connectStatus"></div>
</div>

<div class="box" id="gameBox" style="display:none">
  <div class="players">
    <div class="player" id="playerA">
      <div id="playerAName"></div>
      <div class="life" id="playerALife"></div>
      <div id="playerAInv"></div>
    </div>
    <div class="player" id="playerB">
      <div id="playerBName"></div>
      <div class="life" id="playerBLife"></div>
      <div id="playerBInv"></div>
    </div>
  </div>

  <p>Recarga #<span id="reloadCount"></span></p>
  <p id="chamberBreakdown" style="min-height: 1.2em; color:#ffcc55;"></p>
  <p id="turnIndicator" style="font-weight:bold"></p>

  <div id="myItems"></div>

  <div>
    <button id="shootSelfBtn">Atirar em mim mesmo</button>
    <button id="shootOpponentBtn">Atirar no oponente</button>
  </div>
</div>

<div class="box">
  <strong>Log</strong>
  <div id="log"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const TOKEN_KEY = 'buckshot_token';
const USERNAME_KEY = 'buckshot_username';

let socket = null;
let myPlayerId = null;
let opponentId = null;
let matchId = null;
let myInventory = [];
let lastState = null;
let lastReloadCount = null;
let reloadAnimTimeout = null;

const ITEM_LABELS = {
  ver_municao: '👁️ Ver munição',
  retirar_municao: '🔧 Retirar munição',
  travar_adversario: '🔒 Travar adversário',
  curar: '💊 Curar',
  dano_dobrado: '💥 Dano dobrado',
};

function log(msg, cls) {
  const div = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function show(id) {
  document.getElementById(id).style.display = 'block';
}
function hide(id) {
  document.getElementById(id).style.display = 'none';
}

// ---------------------------------------------------------------------
// AUTENTICAÇÃO
// ---------------------------------------------------------------------

document.getElementById('showRegister').addEventListener('click', () => {
  hide('loginForm');
  show('registerForm');
});
document.getElementById('showLogin').addEventListener('click', () => {
  hide('registerForm');
  show('loginForm');
});

async function callAuthEndpoint(path, username, password) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'erro desconhecido');
  return data;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const { token, user } = await callAuthEndpoint('/auth/login', username, password);
    onAuthenticated(token, user.username);
  } catch (err) {
    errEl.textContent = err.message;
  }
});

document.getElementById('registerBtn').addEventListener('click', async () => {
  const username = document.getElementById('registerUsername').value.trim();
  const password = document.getElementById('registerPassword').value;
  const errEl = document.getElementById('registerError');
  errEl.textContent = '';
  try {
    const { token, user } = await callAuthEndpoint('/auth/register', username, password);
    onAuthenticated(token, user.username);
  } catch (err) {
    errEl.textContent = err.message;
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USERNAME_KEY);
  if (socket) socket.disconnect();
  socket = null;
  myPlayerId = null;
  hide('connectBox');
  hide('gameBox');
  show('authBox');
});

function onAuthenticated(token, username) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(USERNAME_KEY, username);
  hide('authBox');
  connectSocket(token, username);
}

// Se já tinha um token salvo (sessão anterior), pula direto pro login.
const savedToken = localStorage.getItem(TOKEN_KEY);
const savedUsername = localStorage.getItem(USERNAME_KEY);
if (savedToken && savedUsername) {
  hide('authBox');
  connectSocket(savedToken, savedUsername);
} else {
  show('authBox');
}

// ---------------------------------------------------------------------
// CONEXÃO DO SOCKET (só acontece DEPOIS de autenticar)
// ---------------------------------------------------------------------

function connectSocket(token, username) {
  myPlayerId = username;
  document.getElementById('loggedUsername').textContent = username;
  show('connectBox');

  socket = io({ auth: { token } });

  socket.on('connect_error', (err) => {
    log(`Falha de conexão/autenticação: ${err.message}`, 'log-error');
    if (err.message && err.message.includes('unauthorized')) {
      // token inválido/expirado -- força novo login
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USERNAME_KEY);
      hide('connectBox');
      show('authBox');
    }
  });

  document.getElementById('findMatchBtn').addEventListener('click', () => {
    socket.emit('find_match');
    document.getElementById('connectStatus').textContent = 'Procurando oponente...';
    document.getElementById('findMatchBtn').disabled = true;
  });

  socket.on('waiting_for_opponent', () => {
    log('Aguardando oponente entrar na fila...', 'log-system');
  });

  socket.on('match_found', (data) => {
    matchId = data.matchId;
    myInventory = data.inventory;
    hide('connectBox');
    show('gameBox');
    log(`Partida encontrada! matchId=${matchId}`, 'log-system');
  });

  socket.on('rejoined', (data) => {
    matchId = data.matchId;
    myPlayerId = data.yourPlayerId;
    myInventory = data.inventory;
    hide('connectBox');
    show('gameBox');
    log(`Reconectado à partida ${matchId} como ${myPlayerId}`, 'log-system');
    lastReloadCount = data.state.reloadCount;
    applyStateUpdate(data.state);
  });

  socket.on('state_update', applyStateUpdate);

  socket.on('inventory_update', (data) => {
    myInventory = data.inventory;
    if (lastState) renderMyItems(lastState.currentTurnPlayerId === myPlayerId && !lastState.gameOver);
  });

  socket.on('item_used', (evt) => {
    const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
    let msg = `${who} usou ${ITEM_LABELS[evt.itemType] || evt.itemType}`;
    if (evt.bullet) msg += ` -> bala removida era: ${evt.bullet.toUpperCase()}`;
    if (evt.newLife !== undefined) msg += ` -> vida agora: ${evt.newLife}`;
    if (evt.reloaded) msg += ' -> ARMA RECARREGADA';
    log(msg);
  });

  socket.on('item_result', (evt) => {
    log(`🔎 [PRIVADO] Você viu: a bala é ${evt.bullet.toUpperCase()}`, 'log-private');
  });

  socket.on('shot_resolved', (evt) => {
    const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
    const alvo = evt.type === 'shot_self' ? 'em si mesmo' : 'no oponente';
    let msg = `${who} atirou ${alvo} -> bala ${evt.bullet.toUpperCase()}`;
    if (evt.damage > 0) msg += ` -> ${evt.damage} de dano`;
    if (evt.chamberEmpty) msg += ' -> ARMA RECARREGADA';
    log(msg);
  });

  socket.on('match_ended', (evt) => {
    const won = evt.winnerId === myPlayerId;
    log(`🏁 PARTIDA ENCERRADA — vencedor: ${evt.winnerId} (${won ? 'VOCÊ GANHOU!' : 'você perdeu'}) motivo: ${evt.reason}`, 'log-system');
    document.getElementById('shootSelfBtn').disabled = true;
    document.getElementById('shootOpponentBtn').disabled = true;
  });

  socket.on('opponent_disconnected', (evt) => {
    log(`⚠️ Jogador ${evt.playerId} desconectou.`, 'log-error');
  });
  socket.on('opponent_reconnected', (evt) => {
    log(`✅ Jogador ${evt.playerId} reconectou.`, 'log-system');
  });
  socket.on('error_msg', (msg) => {
    log(`ERRO: ${msg}`, 'log-error');
    if (!matchId) {
      document.getElementById('connectStatus').textContent = 'Erro: ' + msg;
      document.getElementById('findMatchBtn').disabled = false;
    }
  });
}

// ---------------------------------------------------------------------
// RENDERIZAÇÃO DO JOGO (igual antes, só que myPlayerId vem do login)
// ---------------------------------------------------------------------

function applyStateUpdate(state) {
  const previousReloadCount = lastReloadCount;
  lastReloadCount = state.reloadCount;
  lastState = state;
  const ids = Object.keys(state.players);
  opponentId = ids.find((id) => id !== myPlayerId) || ids.find((id) => id !== undefined);

  renderPlayer('playerA', myPlayerId, state);
  renderPlayer('playerB', opponentId, state);

  document.getElementById('reloadCount').textContent = state.reloadCount;

  const isFirstSnapshot = previousReloadCount === null;
  const justReloaded = isFirstSnapshot || state.reloadCount !== previousReloadCount;
  if (justReloaded) {
    showChamberPreview(state.chamberReal, state.chamberVazia);
  }

  const isMyTurn = state.currentTurnPlayerId === myPlayerId;
  document.getElementById('turnIndicator').textContent = isMyTurn
    ? '👉 SUA VEZ'
    : `Vez de: ${state.currentTurnPlayerId}`;

  document.getElementById('shootSelfBtn').disabled = !isMyTurn || state.gameOver;
  document.getElementById('shootOpponentBtn').disabled = !isMyTurn || state.gameOver;

  renderMyItems(isMyTurn && !state.gameOver);
}

function showChamberPreview(real, vazia) {
  if (reloadAnimTimeout) clearTimeout(reloadAnimTimeout);
  const el = document.getElementById('chamberBreakdown');
  const icons = shuffleArray([
    ...Array(real).fill('🔴'),
    ...Array(vazia).fill('⚪'),
  ]);
  el.textContent = icons.join(' ');
  reloadAnimTimeout = setTimeout(() => {
    el.textContent = '';
  }, 5000);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderPlayer(domPrefix, playerId, state) {
  if (!playerId || !state.players[playerId]) return;
  const p = state.players[playerId];
  const isTurn = state.currentTurnPlayerId === playerId;
  document.getElementById(domPrefix).classList.toggle('turn', isTurn);
  document.getElementById(domPrefix + 'Name').textContent =
    (playerId === myPlayerId ? '🧍 Você' : '🎯 Oponente') + ` (${playerId})`;
  document.getElementById(domPrefix + 'Life').textContent = '❤️'.repeat(Math.max(p.life, 0)) || '💀';
  document.getElementById(domPrefix + 'Inv').textContent = `Itens no inventário: ${p.inventoryCount}`;
}

function renderMyItems(enabled) {
  const container = document.getElementById('myItems');
  container.innerHTML = '<strong>Seus itens:</strong><br>';
  myInventory.forEach((itemType) => {
    const btn = document.createElement('button');
    btn.textContent = ITEM_LABELS[itemType] || itemType;
    btn.disabled = !enabled;
    btn.addEventListener('click', () => {
      socket.emit('use_item', { matchId, itemType });
    });
    container.appendChild(btn);
  });
}

document.getElementById('shootSelfBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'self' });
});
document.getElementById('shootOpponentBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'opponent' });
});
</script>
</body>
</html>
