<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - Entrar</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>🔫 Buckshot Roulette Web</h1>

<div class="box" id="loginBox">
  <strong>Entrar</strong>
  <input id="loginUsername" placeholder="username" autocomplete="username" />
  <input id="loginPassword" type="password" placeholder="senha" autocomplete="current-password" />
  <button id="loginBtn">Entrar</button>
  <div class="error-text" id="loginError"></div>
  <a class="toggle-link" href="/register.html">Não tem conta? Cadastre-se</a>
</div>

<script src="/shared.js"></script>
<script>
redirectIfAlreadyLoggedIn();

document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const { token, user } = await callAuthEndpoint('/auth/login', username, password);
    setSession(token, user.username);
    window.location.href = '/profile.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});

// permite dar Enter no campo de senha pra logar, sem precisar clicar
document.getElementById('loginPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
