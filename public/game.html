<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - Jogo</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>🔫 Buckshot Roulette Web — PvP</h1>
<div class="nav-bar">
  <a href="/profile.html">
    <span class="bullet-icon"></span> Voltar ao perfil
  </a>
</div>

<div class="box" id="connectBox">
  <div>Logado como <strong id="loggedUsername"></strong></div>
  <button id="findMatchBtn">Procurar partida</button>
  <div id="connectStatus"></div>
</div>

<div class="box" id="gameBox" style="display:none">
  <div class="players">
    <div class="player" id="playerA">
      <div id="playerAName"></div>
      <div class="life" id="playerALife"></div>
      <div id="playerAInv"></div>
    </div>
    <div class="player" id="playerB">
      <div id="playerBName"></div>
      <div class="life" id="playerBLife"></div>
      <div id="playerBInv"></div>
    </div>
  </div>

  <p>Recarga #<span id="reloadCount"></span></p>
  <p id="chamberBreakdown" style="min-height: 1.2em; color:#ffcc55;"></p>
  <p id="turnIndicator" style="font-weight:bold"></p>

  <div id="myItems"></div>

  <div>
    <button id="shootSelfBtn">Atirar em mim mesmo</button>
    <button id="shootOpponentBtn">Atirar no oponente</button>
  </div>
</div>

<div class="box">
  <strong>Log</strong>
  <div id="log"></div>
</div>

<script src="/shared.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
if (!requireAuth()) {
  // requireAuth já redireciona pra /index.html; interrompe o resto do script
  throw new Error('sem sessão, redirecionando');
}

const myUsername = getUsername();
document.getElementById('loggedUsername').textContent = myUsername;

let socket = null;
let myPlayerId = myUsername;
let opponentId = null;
let matchId = null;
let myInventory = [];
let lastState = null;
let lastReloadCount = null;
let reloadAnimTimeout = null;

const ITEM_LABELS = {
  ver_municao: '👁️ Ver munição',
  retirar_municao: '🔧 Retirar munição',
  travar_adversario: '🔒 Travar adversário',
  curar: '💊 Curar',
  dano_dobrado: '💥 Dano dobrado',
};

function log(msg, cls) {
  const div = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

// ---------------------------------------------------------------------
// CONEXÃO DO SOCKET
// ---------------------------------------------------------------------

socket = io({ auth: { token: getToken() } });

socket.on('connect_error', (err) => {
  log(`Falha de conexão/autenticação: ${err.message}`, 'log-error');
  if (err.message && err.message.includes('unauthorized')) {
    // token inválido/expirado -- força novo login
    clearSession();
    window.location.href = '/index.html';
  }
});

document.getElementById('findMatchBtn').addEventListener('click', () => {
  socket.emit('find_match');
  document.getElementById('connectStatus').textContent = 'Procurando oponente...';
  document.getElementById('findMatchBtn').disabled = true;
});

socket.on('waiting_for_opponent', () => {
  log('Aguardando oponente entrar na fila...', 'log-system');
});

socket.on('match_found', (data) => {
  matchId = data.matchId;
  myInventory = data.inventory;
  document.getElementById('connectBox').style.display = 'none';
  document.getElementById('gameBox').style.display = 'block';
  log(`[BALA] Partida encontrada! matchId=${matchId}`, 'log-system');
});

socket.on('rejoined', (data) => {
  matchId = data.matchId;
  myPlayerId = data.yourPlayerId;
  myInventory = data.inventory;
  document.getElementById('connectBox').style.display = 'none';
  document.getElementById('gameBox').style.display = 'block';
  log(`Reconectado à partida ${matchId} como ${myPlayerId}`, 'log-system');
  lastReloadCount = data.state.reloadCount;
  applyStateUpdate(data.state);
});

socket.on('state_update', applyStateUpdate);

socket.on('inventory_update', (data) => {
  myInventory = data.inventory;
  if (lastState) renderMyItems(lastState.currentTurnPlayerId === myPlayerId && !lastState.gameOver);
});

socket.on('item_used', (evt) => {
  const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
  let msg = `${who} usou ${ITEM_LABELS[evt.itemType] || evt.itemType}`;
  if (evt.bullet) msg += ` -> bala removida era: ${evt.bullet.toUpperCase()}`;
  if (evt.newLife !== undefined) msg += ` -> vida agora: ${evt.newLife}`;
  if (evt.reloaded) msg += ' -> ARMA RECARREGADA';
  log(msg);
});

socket.on('item_result', (evt) => {
  log(`🔎 [PRIVADO] Você viu: a bala é ${evt.bullet.toUpperCase()}`, 'log-private');
});

socket.on('shot_resolved', (evt) => {
  const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
  const alvo = evt.type === 'shot_self' ? 'em si mesmo' : 'no oponente';
  let msg = `${who} atirou ${alvo} -> bala ${evt.bullet.toUpperCase()}`;
  if (evt.damage > 0) msg += ` -> ${evt.damage} de dano`;
  if (evt.chamberEmpty) msg += ' -> ARMA RECARREGADA';
  log(msg);
});

socket.on('match_ended', (evt) => {
  const won = evt.winnerId === myPlayerId;
  log(`🏁 PARTIDA ENCERRADA — vencedor: ${evt.winnerId} (${won ? 'VOCÊ GANHOU!' : 'você perdeu'}) motivo: ${evt.reason}`, 'log-system');
  document.getElementById('shootSelfBtn').disabled = true;
  document.getElementById('shootOpponentBtn').disabled = true;
});

socket.on('opponent_disconnected', (evt) => {
  log(`⚠️ Jogador ${evt.playerId} desconectou.`, 'log-error');
});
socket.on('opponent_reconnected', (evt) => {
  log(`✅ Jogador ${evt.playerId} reconectou.`, 'log-system');
});
socket.on('error_msg', (msg) => {
  log(`ERRO: ${msg}`, 'log-error');
  if (!matchId) {
    document.getElementById('connectStatus').textContent = 'Erro: ' + msg;
    document.getElementById('findMatchBtn').disabled = false;
  }
});

// ---------------------------------------------------------------------
// RENDERIZAÇÃO DO JOGO
// ---------------------------------------------------------------------

function applyStateUpdate(state) {
  const previousReloadCount = lastReloadCount;
  lastReloadCount = state.reloadCount;
  lastState = state;
  const ids = Object.keys(state.players);
  opponentId = ids.find((id) => id !== myPlayerId) || ids.find((id) => id !== undefined);

  renderPlayer('playerA', myPlayerId, state);
  renderPlayer('playerB', opponentId, state);

  document.getElementById('reloadCount').textContent = state.reloadCount;

  const isFirstSnapshot = previousReloadCount === null;
  const justReloaded = isFirstSnapshot || state.reloadCount !== previousReloadCount;
  if (justReloaded) {
    showChamberPreview(state.chamberReal, state.chamberVazia);
  }

  const isMyTurn = state.currentTurnPlayerId === myPlayerId;
  document.getElementById('turnIndicator').textContent = isMyTurn
    ? 'SUA VEZ'
    : `Vez de: ${state.currentTurnPlayerId}`;

  document.getElementById('shootSelfBtn').disabled = !isMyTurn || state.gameOver;
  document.getElementById('shootOpponentBtn').disabled = !isMyTurn || state.gameOver;

  renderMyItems(isMyTurn && !state.gameOver);
}

function showChamberPreview(real, vazia) {
  if (reloadAnimTimeout) clearTimeout(reloadAnimTimeout);
  const el = document.getElementById('chamberBreakdown');
  const icons = shuffleArray([
    ...Array(real).fill('🔴'),
    ...Array(vazia).fill('⚪'),
  ]);
  el.textContent = icons.join(' ');
  reloadAnimTimeout = setTimeout(() => {
    el.textContent = '';
  }, 5000);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderPlayer(domPrefix, playerId, state) {
  if (!playerId || !state.players[playerId]) return;
  const p = state.players[playerId];
  const isTurn = state.currentTurnPlayerId === playerId;
  document.getElementById(domPrefix).classList.toggle('turn', isTurn);
  document.getElementById(domPrefix + 'Name').textContent =
    (playerId === myPlayerId ? '🧍 Você' : '🎯 Oponente') + ` (${playerId})`;
  if (p.life <= 0) {
    document.getElementById(domPrefix + 'Life').innerHTML = '<span class="skull-icon"></span>';
  } else {
    document.getElementById(domPrefix + 'Life').textContent = '♥'.repeat(Math.max(p.life, 0));
  }
  document.getElementById(domPrefix + 'Inv').textContent = `Itens no inventário: ${p.inventoryCount}`;
}

function renderMyItems(enabled) {
  const container = document.getElementById('myItems');
  container.innerHTML = '<strong>Seus itens:</strong><br>';
  myInventory.forEach((itemType) => {
    const btn = document.createElement('button');
    btn.textContent = ITEM_LABELS[itemType] || itemType;
    btn.disabled = !enabled;
    btn.addEventListener('click', () => {
      socket.emit('use_item', { matchId, itemType });
    });
    container.appendChild(btn);
  });
}

document.getElementById('shootSelfBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'self' });
});
document.getElementById('shootOpponentBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'opponent' });
});
</script>
</body>
</html>
