<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - Jogo</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<h1><i class="bi bi-crosshair2"></i> Buckshot Roulette Web — PvP</h1>
<div class="nav-bar">
  <a href="/profile.html">
    <i class="bi bi-arrow-left-circle"></i> Voltar ao perfil
  </a>
</div>

<div class="box" id="connectBox">
  <div>Logado como <strong id="loggedUsername"></strong></div>
  <button id="findMatchBtn">Procurar partida</button>
  <div id="connectStatus"></div>
</div>

<div class="box" id="gameBox" style="display:none">
  <div class="players">
    <div class="player" id="playerA">
      <div id="playerAName"></div>
      <div class="life" id="playerALife"></div>
      <div id="playerAInv"></div>
    </div>
    <div class="player" id="playerB">
      <div id="playerBName"></div>
      <div class="life" id="playerBLife"></div>
      <div id="playerBInv"></div>
    </div>
  </div>

  <p>Recarga #<span id="reloadCount"></span></p>
  <p id="chamberBreakdown" style="min-height: 1.2em; color:#ffcc55;"></p>
  <p id="turnIndicator" style="font-weight:bold"></p>
  <p id="turnTimerDisplay" style="display:none; font-weight:bold;"></p>
  <p id="reconnectTimerDisplay" style="display:none; font-weight:bold; color:#ff8833;"></p>

  <div id="myItems"></div>

  <div class="decision-row" id="decisionRow">
    <button id="shootSelfBtn"><i class="bi bi-person-fill-down"></i> Atirar em mim mesmo</button>
    <span class="decision-divider">OU</span>
    <button id="shootOpponentBtn"><i class="bi bi-crosshair"></i> Atirar no oponente</button>
  </div>
</div>

<div class="box">
  <strong>Log</strong>
  <div id="log"></div>
</div>

<script src="/shared.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
if (!requireAuth()) {
  // requireAuth já redireciona pra /index.html; interrompe o resto do script
  throw new Error('sem sessão, redirecionando');
}

const myUsername = getUsername();
document.getElementById('loggedUsername').textContent = myUsername;

let socket = null;
let myPlayerId = myUsername;
let opponentId = null;
let matchId = null;
let myInventory = [];
let lastState = null;
let lastReloadCount = null;
let reloadAnimTimeout = null;

const ITEM_LABELS = {
  ver_municao: 'Ver munição',
  retirar_municao: 'Retirar munição',
  travar_adversario: 'Travar adversário',
  curar: 'Curar',
  dano_dobrado: 'Dano dobrado',
};

const ITEM_ICONS = {
  ver_municao: 'bi-eye',
  retirar_municao: 'bi-wrench-adjustable',
  travar_adversario: 'bi-lock-fill',
  curar: 'bi-heart-pulse-fill',
  dano_dobrado: 'bi-fire',
};

function log(msg, cls, icon) {
  const div = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  if (icon) {
    const i = document.createElement('i');
    i.className = `bi ${icon} log-icon`;
    line.appendChild(i);
  }
  line.appendChild(document.createTextNode(msg));
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

// ---------------------------------------------------------------------
// CONEXÃO DO SOCKET
// ---------------------------------------------------------------------

socket = io({ auth: { token: getToken() } });

socket.on('connect_error', (err) => {
  log(`Falha de conexão/autenticação: ${err.message}`, 'log-error');
  if (err.message && err.message.includes('unauthorized')) {
    // token inválido/expirado -- força novo login
    clearSession();
    window.location.href = '/index.html';
  }
});

document.getElementById('findMatchBtn').addEventListener('click', () => {
  socket.emit('find_match');
  document.getElementById('connectStatus').textContent = 'Procurando oponente...';
  document.getElementById('findMatchBtn').disabled = true;
});

socket.on('waiting_for_opponent', () => {
  log('Aguardando oponente entrar na fila...', 'log-system');
});

socket.on('match_found', (data) => {
  matchId = data.matchId;
  myInventory = data.inventory;
  document.getElementById('connectBox').style.display = 'none';
  document.getElementById('gameBox').style.display = 'block';
  log(`Partida encontrada! matchId=${matchId}`, 'log-system', 'bi-crosshair2');
});

socket.on('rejoined', (data) => {
  matchId = data.matchId;
  myPlayerId = data.yourPlayerId;
  myInventory = data.inventory;
  document.getElementById('connectBox').style.display = 'none';
  document.getElementById('gameBox').style.display = 'block';
  log(`Reconectado à partida ${matchId} como ${myPlayerId}`, 'log-system');
  lastReloadCount = data.state.reloadCount;
  applyStateUpdate(data.state);
  if (data.activeTurnTimerDeadline) {
    startTurnTimerDisplay(data.activeTurnTimerDeadline, data.activeTurnTimerPlayerId);
  }
});

socket.on('state_update', applyStateUpdate);

socket.on('inventory_update', (data) => {
  myInventory = data.inventory;
  if (lastState) renderMyItems(lastState.currentTurnPlayerId === myPlayerId && !lastState.gameOver);
});

socket.on('item_used', (evt) => {
  const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
  let msg = `${who} usou ${ITEM_LABELS[evt.itemType] || evt.itemType}`;
  if (evt.bullet) msg += ` -> bala removida era: ${evt.bullet.toUpperCase()}`;
  if (evt.newLife !== undefined) msg += ` -> vida agora: ${evt.newLife}`;
  if (evt.reloaded) msg += ' -> ARMA RECARREGADA';
  log(msg);
});

socket.on('item_result', (evt) => {
  log(`[PRIVADO] Você viu: a bala é ${evt.bullet.toUpperCase()}`, 'log-private', 'bi-eye-fill');
});

socket.on('shot_resolved', (evt) => {
  const who = evt.playerId === myPlayerId ? 'Você' : 'Oponente';
  const alvo = evt.type === 'shot_self' ? 'em si mesmo' : 'no oponente';
  let msg = `${who} atirou ${alvo} -> bala ${evt.bullet.toUpperCase()}`;
  if (evt.damage > 0) msg += ` -> ${evt.damage} de dano`;
  if (evt.chamberEmpty) msg += ' -> ARMA RECARREGADA';
  log(msg);
});

socket.on('match_ended', (evt) => {
  const won = evt.winnerId === myPlayerId;
  log(`PARTIDA ENCERRADA — vencedor: ${evt.winnerId} (${won ? 'VOCÊ GANHOU!' : 'você perdeu'}) motivo: ${evt.reason}`, 'log-system', 'bi-flag-fill');
  document.getElementById('shootSelfBtn').disabled = true;
  document.getElementById('shootOpponentBtn').disabled = true;
  document.getElementById('decisionRow').style.display = 'none';
  stopTurnTimerDisplay();
  stopReconnectTimerDisplay();
});

socket.on('opponent_disconnected', (evt) => {
  log(`Jogador ${evt.playerId} desconectou.`, 'log-error', 'bi-exclamation-triangle-fill');
});
socket.on('opponent_reconnected', (evt) => {
  log(`Jogador ${evt.playerId} reconectou.`, 'log-system', 'bi-check-circle-fill');
  stopReconnectTimerDisplay();
});

socket.on('turn_timer_started', (data) => {
  stopReconnectTimerDisplay(); // mutuamente exclusivos -- se o turno tá rodando, ninguém tá em reconexão
  startTurnTimerDisplay(data.deadline, data.playerId);
});

socket.on('reconnect_timer_started', (data) => {
  stopTurnTimerDisplay(); // mutuamente exclusivos
  startReconnectTimerDisplay(data.deadline, data.playerId);
});

socket.on('error_msg', (msg) => {
  log(`ERRO: ${msg}`, 'log-error');
  if (!matchId) {
    document.getElementById('connectStatus').textContent = 'Erro: ' + msg;
    document.getElementById('findMatchBtn').disabled = false;
  }
});

// ---------------------------------------------------------------------
// RENDERIZAÇÃO DO JOGO
// ---------------------------------------------------------------------

// ---------------------------------------------------------------------
// TIMERS VISÍVEIS (turno e reconexão) -- seção 9
// ---------------------------------------------------------------------
// A contagem é calculada LOCALMENTE a partir de um deadline (horário
// absoluto) mandado pelo servidor, não por ticks recebidos via rede --
// isso evita que latência/drift bagunce o número exibido.

let turnTimerInterval = null;
let reconnectTimerInterval = null;

function formatSeconds(ms) {
  const totalSeconds = Math.max(Math.ceil(ms / 1000), 0);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${String(seconds).padStart(2, '0')}`;
}

function startTurnTimerDisplay(deadline, playerId) {
  stopTurnTimerDisplay();
  const el = document.getElementById('turnTimerDisplay');
  el.style.display = 'block';

  const who = playerId === myPlayerId ? 'Você tem' : 'Oponente tem';

  function tick() {
    const remaining = deadline - Date.now();
    if (remaining <= 0) {
      el.textContent = `${who === 'Você tem' ? 'Seu' : 'O'} tempo esgotou`;
      stopTurnTimerDisplay();
      return;
    }
    el.innerHTML = `<i class="bi bi-stopwatch-fill"></i> ${who} ${formatSeconds(remaining)} pra agir`;
    el.style.color = remaining < 10000 ? '#ff3333' : '#ffcc55';
  }

  tick();
  turnTimerInterval = setInterval(tick, 250);
}

function stopTurnTimerDisplay() {
  if (turnTimerInterval) {
    clearInterval(turnTimerInterval);
    turnTimerInterval = null;
  }
  document.getElementById('turnTimerDisplay').style.display = 'none';
}

function startReconnectTimerDisplay(deadline, playerId) {
  stopReconnectTimerDisplay();
  const el = document.getElementById('reconnectTimerDisplay');
  el.style.display = 'block';

  const who = playerId === myPlayerId ? 'Você está' : 'Oponente está';

  function tick() {
    const remaining = deadline - Date.now();
    if (remaining <= 0) {
      el.textContent = 'Tempo de reconexão esgotado';
      stopReconnectTimerDisplay();
      return;
    }
    el.innerHTML = `<i class="bi bi-wifi-off"></i> ${who} desconectado -- ${formatSeconds(remaining)} pra reconectar antes da derrota automática`;
  }

  tick();
  reconnectTimerInterval = setInterval(tick, 250);
}

function stopReconnectTimerDisplay() {
  if (reconnectTimerInterval) {
    clearInterval(reconnectTimerInterval);
    reconnectTimerInterval = null;
  }
  document.getElementById('reconnectTimerDisplay').style.display = 'none';
}

function applyStateUpdate(state) {
  const previousReloadCount = lastReloadCount;
  lastReloadCount = state.reloadCount;
  lastState = state;
  const ids = Object.keys(state.players);
  opponentId = ids.find((id) => id !== myPlayerId) || ids.find((id) => id !== undefined);

  renderPlayer('playerA', myPlayerId, state);
  renderPlayer('playerB', opponentId, state);

  document.getElementById('reloadCount').textContent = state.reloadCount;

  const isFirstSnapshot = previousReloadCount === null;
  const justReloaded = isFirstSnapshot || state.reloadCount !== previousReloadCount;
  if (justReloaded) {
    showChamberPreview(state.chamberReal, state.chamberVazia);
  }

  const isMyTurn = state.currentTurnPlayerId === myPlayerId;
  document.getElementById('turnIndicator').textContent = isMyTurn
    ? 'SUA VEZ'
    : `Vez de: ${state.currentTurnPlayerId}`;

  document.getElementById('shootSelfBtn').disabled = !isMyTurn || state.gameOver;
  document.getElementById('shootOpponentBtn').disabled = !isMyTurn || state.gameOver;
  document.getElementById('decisionRow').style.display = (isMyTurn && !state.gameOver) ? 'flex' : 'none';

  renderMyItems(isMyTurn && !state.gameOver);
}

const CHAMBER_SLOTS = 8;

function showChamberPreview(real, vazia) {
  if (reloadAnimTimeout) clearTimeout(reloadAnimTimeout);
  const el = document.getElementById('chamberBreakdown');
  const icons = shuffleArray([
    ...Array(real).fill('<i class="bi bi-circle-fill chamber-live"></i>'),
    ...Array(vazia).fill('<i class="bi bi-circle-fill chamber-blank"></i>'),
  ]);
  const slots = Array.from({ length: CHAMBER_SLOTS }, (_, i) =>
    `<div class="chamber-slot">${icons[i] || ''}</div>`
  );
  el.innerHTML = slots.join('');
  reloadAnimTimeout = setTimeout(() => {
    el.innerHTML = '';
  }, 5000);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderPlayer(domPrefix, playerId, state) {
  if (!playerId || !state.players[playerId]) return;
  const p = state.players[playerId];
  const isTurn = state.currentTurnPlayerId === playerId;
  document.getElementById(domPrefix).classList.toggle('turn', isTurn);
  const nameIcon = playerId === myPlayerId ? 'bi-person-fill' : 'bi-bullseye';
  const nameLabel = playerId === myPlayerId ? 'Você' : 'Oponente';
  document.getElementById(domPrefix + 'Name').innerHTML =
    `<i class="bi ${nameIcon}"></i> ${nameLabel} (${playerId})`;
  if (p.life <= 0) {
    document.getElementById(domPrefix + 'Life').innerHTML = '<i class="bi bi-emoji-dizzy-fill skull-icon"></i>';
  } else {
    document.getElementById(domPrefix + 'Life').innerHTML =
      '<i class="bi bi-lightning-charge-fill life-icon"></i>'.repeat(Math.max(p.life, 0));
  }
  document.getElementById(domPrefix + 'Inv').innerHTML =
    `<i class="bi bi-bag-fill"></i> Itens no inventário: ${p.inventoryCount}`;
}

function renderMyItems(enabled) {
  const container = document.getElementById('myItems');
  container.innerHTML = '<strong>Seus itens:</strong>';
  myInventory.forEach((itemType) => {
    const btn = document.createElement('button');
    btn.innerHTML = `<i class="bi ${ITEM_ICONS[itemType] || 'bi-box-seam'}"></i> ${ITEM_LABELS[itemType] || itemType}`;
    btn.disabled = !enabled;
    btn.addEventListener('click', () => {
      socket.emit('use_item', { matchId, itemType });
    });
    container.appendChild(btn);
  });
}

document.getElementById('shootSelfBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'self' });
});
document.getElementById('shootOpponentBtn').addEventListener('click', () => {
  socket.emit('shoot', { matchId, target: 'opponent' });
});
</script>
</body>
</html>
