<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - Ranking</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<h1><i class="bi bi-trophy-fill"></i> Ranking PvP (temporada atual)</h1>
<div class="nav-bar"><a href="/profile.html"><i class="bi bi-arrow-left-circle"></i> Voltar ao perfil</a></div>

<div class="box">
  <p id="seasonInfo" class="info-text"></p>
  <p class="info-text">
    Só aparecem aqui usuários com pelo menos 10 partidas PvP jogadas
    nesta temporada (seção 10 do design). Pontuação: +1 por vitória,
    -0,5 por derrota.
  </p>
  <div id="leaderboardContent">carregando...</div>
</div>

<script src="/shared.js"></script>
<script>
if (requireAuth()) {
  loadLeaderboard();
}

async function loadLeaderboard() {
  const el = document.getElementById('leaderboardContent');
  const seasonInfoEl = document.getElementById('seasonInfo');
  const myUsername = getUsername();

  try {
    const { leaderboard, seasonStartedAt } = await fetchAuthed('/ranking/leaderboard');

    if (seasonStartedAt) {
      const date = new Date(seasonStartedAt);
      seasonInfoEl.textContent = `Temporada atual iniciada em: ${date.toLocaleDateString('pt-BR')}`;
    }

    if (leaderboard.length === 0) {
      el.textContent = 'Ninguém classificado ainda (ninguém atingiu 10 partidas PvP nessa temporada).';
      return;
    }

    const rows = leaderboard.map((entry) => {
      const isMe = entry.username === myUsername;
      const rankClass = entry.rank <= 3 ? `rank-${entry.rank}` : '';
      const rankCell = entry.rank <= 3
        ? `<i class="bi bi-trophy-fill lb-rank-icon"></i> ${entry.rank}`
        : `${entry.rank}`;
      const pointsClass = entry.seasonPoints > 0 ? 'lb-points-pos' : entry.seasonPoints < 0 ? 'lb-points-neg' : '';
      return `
        <tr class="${isMe ? 'lb-row-me' : ''} ${rankClass}">
          <td class="lb-rank">${rankCell}</td>
          <td class="lb-player">${entry.username}${isMe ? ' <span class="lb-you-tag">você</span>' : ''}</td>
          <td>${entry.seasonWins}</td>
          <td>${entry.seasonLosses}</td>
          <td class="${pointsClass}">${entry.seasonPoints}</td>
        </tr>
      `;
    }).join('');

    el.innerHTML = `
      <table class="lb-table">
        <thead>
          <tr><th>#</th><th>Jogador</th><th><i class="bi bi-trophy-fill"></i></th><th><i class="bi bi-emoji-dizzy-fill"></i></th><th><i class="bi bi-star-fill"></i></th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    el.textContent = 'Não foi possível carregar o ranking: ' + err.message;
  }
}
</script>
</body>
</html>
