<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buckshot Roulette Web - Perfil</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<h1><i class="bi bi-crosshair2"></i> Buckshot Roulette Web</h1>

<div class="box">
  <div>Logado como <strong id="usernameDisplay"></strong></div>
  <button id="playBtn"><i class="bi bi-controller"></i> Jogar PvP</button>
  <button id="leaderboardBtn"><i class="bi bi-trophy-fill"></i> Ver ranking</button>
  <button id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Sair</button>
</div>

<div class="box">
  <strong>Estatísticas (PvP)</strong>
  <div id="statsContent" class="stats-loading">carregando...</div>
  <div id="qualificationBadge" style="margin-top:8px; font-weight:bold;"></div>
</div>

<script src="/shared.js"></script>
<script>
if (requireAuth()) {
  document.getElementById('usernameDisplay').textContent = getUsername();
  loadStats();
}

async function loadStats() {
  const statsEl = document.getElementById('statsContent');
  const badgeEl = document.getElementById('qualificationBadge');
  try {
    const { user } = await fetchAuthed('/auth/me');
    statsEl.innerHTML = `
      <div class="stat-section-label"><i class="bi bi-calendar3"></i> Temporada</div>
      <div class="stat-grid">
        <div class="stat-tile">
          <i class="bi bi-trophy-fill stat-icon stat-icon-win"></i>
          <div class="stat-value">${user.seasonWins}</div>
          <div class="stat-label">Vitórias</div>
        </div>
        <div class="stat-tile">
          <i class="bi bi-emoji-dizzy-fill stat-icon stat-icon-loss"></i>
          <div class="stat-value">${user.seasonLosses}</div>
          <div class="stat-label">Derrotas</div>
        </div>
        <div class="stat-tile">
          <i class="bi bi-star-fill stat-icon stat-icon-points"></i>
          <div class="stat-value">${user.seasonPoints}</div>
          <div class="stat-label">Pontos</div>
        </div>
        <div class="stat-tile">
          <i class="bi bi-controller stat-icon stat-icon-games"></i>
          <div class="stat-value">${user.seasonGamesPlayed}</div>
          <div class="stat-label">Partidas</div>
        </div>
      </div>
      <div class="stat-section-label"><i class="bi bi-archive-fill"></i> Histórico total</div>
      <div class="stat-grid stat-grid-secondary">
        <div class="stat-tile stat-tile-secondary">
          <i class="bi bi-trophy-fill stat-icon stat-icon-win"></i>
          <div class="stat-value">${user.totalWins}</div>
          <div class="stat-label">Vitórias</div>
        </div>
        <div class="stat-tile stat-tile-secondary">
          <i class="bi bi-emoji-dizzy-fill stat-icon stat-icon-loss"></i>
          <div class="stat-value">${user.totalLosses}</div>
          <div class="stat-label">Derrotas</div>
        </div>
      </div>
    `;
    if (user.qualified) {
      badgeEl.innerHTML = '<i class="bi bi-check-circle-fill"></i> Classificado no ranking oficial';
      badgeEl.style.color = '#55ff55';
    } else {
      badgeEl.innerHTML = `<i class="bi bi-hourglass-split"></i> Não classificado -- faltam ${user.gamesUntilQualified} partida(s) PvP (mínimo 10 na temporada)`;
      badgeEl.style.color = '#ffcc55';
    }
  } catch (err) {
    statsEl.textContent = 'Não foi possível carregar as estatísticas: ' + err.message;
  }
}

document.getElementById('playBtn').addEventListener('click', () => {
  window.location.href = '/game.html';
});

document.getElementById('leaderboardBtn').addEventListener('click', () => {
  window.location.href = '/leaderboard.html';
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  clearSession();
  window.location.href = '/index.html';
});
</script>
</body>
</html>
